<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Stylized data visualization: ascending bars + trend line -->
  <!-- Bars -->
  <rect x="14" y="36" width="7" height="14" rx="2" fill="url(#bar1)" opacity="0.55"/>
  <rect x="24" y="28" width="7" height="22" rx="2" fill="url(#bar1)" opacity="0.7"/>
  <rect x="34" y="20" width="7" height="30" rx="2" fill="url(#bar1)" opacity="0.85"/>
  <rect x="44" y="12" width="7" height="38" rx="2" fill="url(#bar1)"/>
  <!-- Trend line through bar tops -->
  <path d="M17.5 36 L27.5 28 L37.5 20 L47.5 12" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4"/>
  <!-- Data point markers -->
  <circle cx="17.5" cy="36" r="2.5" fill="#ffffff"/>
  <circle cx="27.5" cy="28" r="2.5" fill="#ffffff"/>
  <circle cx="37.5" cy="20" r="2.5" fill="#ffffff"/>
  <circle cx="47.5" cy="12" r="3" fill="#ffffff"/>
  <!-- Glow on top point -->
  <circle cx="47.5" cy="12" r="5" fill="#ffffff" opacity="0.2"/>
</svg>
